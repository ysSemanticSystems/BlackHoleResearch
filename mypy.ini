[mypy]
python_version = 3.11
strict = True
warn_return_any = True
# We pre-declare per-module sections for libraries that Phase 2 milestones
# (photometry, spectra workflows, streamlit-side wiring) will introduce.
# Keep this off so the config sections don't generate noise before then.
warn_unused_configs = False
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
show_error_codes = True
files = blackhole

# astropy and astroquery do not ship complete stubs; treat as untyped
# at module boundaries rather than gating CI on third-party type drift.
[mypy-astropy.*]
ignore_missing_imports = True

[mypy-astroquery.*]
ignore_missing_imports = True

[mypy-photutils.*]
ignore_missing_imports = True

[mypy-specutils.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True
